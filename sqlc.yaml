version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/store/schema.sql"
    queries: "internal/store/queries"
    gen:
      go:
        package: "store"
        out: "internal/store"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
