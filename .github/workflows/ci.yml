name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go (build, vet, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum \
            || { echo "::error::go.mod/go.sum not tidy — run 'go mod tidy' and commit"; exit 1; }

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed on:"; echo "$unformatted"; exit 1
          fi

      - name: Build
        run: make build

      - name: Lint (go vet)
        run: make lint

      - name: Test
        run: make test

  dashboard:
    name: Dashboard (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
      - run: npm run build
